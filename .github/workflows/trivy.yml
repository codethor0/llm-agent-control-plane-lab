name: Trivy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  container-scan:
    name: Container image scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image for scan
        run: docker build -t llm-agent-control-plane:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: llm-agent-control-plane:scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          vuln-type: os,library

      - name: Trivy summary
        if: always()
        run: |
          echo "Trivy scanned image llm-agent-control-plane:scan (CRITICAL and HIGH, unfixed only)."
